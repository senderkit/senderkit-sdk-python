name: Bug report
description: Report a problem with the SenderKit Python SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include API
        keys, signing secrets, or other credentials in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I call `client.send(...)`, I get ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: "Output of `python -c 'import senderkit; print(senderkit.__version__)'`"
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / logs
      description: Full traceback, with any secrets redacted.
      render: shell
    validations:
      required: false
